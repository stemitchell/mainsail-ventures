<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Thank You · Mainsail Ventures</title>
<meta name="robots" content="noindex, nofollow" />

<!-- Favicons -->
<link rel="icon" type="image/x-icon" href="/favicon.ico?v=3" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=3" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3" />
<meta name="theme-color" content="#0F1823" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --navy: #0F1823;
    --navy-deep: #0A1119;
    --navy-soft: #16202D;
    --cream: #F6F3EE;
    --cream-dim: #E8E3D9;
    --gold: #C9963E;
    --muted-blue: #6B7482;
    --rule: rgba(201, 150, 62, 0.35);
    --rule-soft: rgba(246, 243, 238, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Manrope', system-ui, sans-serif;
    background: var(--navy);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    -webkit-font-smoothing: antialiased;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(circle at 70% 30%, rgba(201, 150, 62, 0.07) 0%, transparent 50%),
      radial-gradient(circle at 30% 70%, rgba(201, 150, 62, 0.04) 0%, transparent 50%);
    pointer-events: none;
  }

  .panel {
    max-width: 580px;
    padding: 64px 56px;
    border: 1px solid var(--rule);
    background: var(--navy-soft);
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px;
    width: 28px; height: 28px;
    border-top: 2px solid var(--gold);
    border-left: 2px solid var(--gold);
  }

  .panel::after {
    content: '';
    position: absolute;
    bottom: -1px; right: -1px;
    width: 28px; height: 28px;
    border-bottom: 2px solid var(--gold);
    border-right: 2px solid var(--gold);
  }

  .eyebrow {
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    color: var(--gold);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    margin-bottom: 18px;
    font-weight: 500;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 56px;
    font-weight: 500;
    line-height: 1.05;
    color: var(--cream);
    margin-bottom: 6px;
  }

  h1 em {
    font-style: italic;
    color: var(--gold);
  }

  .rule {
    width: 40px;
    height: 2px;
    background: var(--gold);
    margin: 22px auto 24px;
  }

  p {
    font-size: 16px;
    line-height: 1.7;
    color: var(--cream-dim);
    margin-bottom: 32px;
    font-weight: 300;
  }

  .btn {
    display: inline-block;
    padding: 16px 36px;
    background: var(--gold);
    color: var(--navy-deep);
    border: 1px solid var(--gold);
    font-family: 'Manrope', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    transition: all 0.25s ease;
  }

  .btn:hover {
    background: var(--cream);
    border-color: var(--cream);
  }

  @media (max-width: 580px) {
    .panel { padding: 48px 32px; }
    h1 { font-size: 40px; }
  }
</style>
</head>
<body>
  <div class="panel">
    <div class="eyebrow">Request Received</div>
    <h1>Thank <em>you.</em></h1>
    <div class="rule"></div>
    <p>
      Your message is on its way to Steven's inbox.  You will hear back within 48 hours to set up a 20-minute call.  If the timing is urgent, feel free to email steve@mainsail.group directly.
    </p>
    <a href="/" class="btn">Return Home &rarr;</a>
  </div>
</body>
</html>
